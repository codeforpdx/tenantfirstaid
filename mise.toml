# mise-en-place monorepo root. See https://mise.jdx.dev.
#
# This repo is a mise monorepo: each project keeps its own config —
#   backend/mise.toml   (uv toolchain + Python checks)
#   frontend/mise.toml  (node toolchain + frontend checks)
# and this root ties them together. Tasks are addressed as `//<project>:<task>`:
#
#   mise run //backend:test              # one backend check, on the host
#   mise run //backend:test --container  # ...the same check inside the ci image
#   mise run //...:check                 # every project's `check`
#   mise run check                       # convenience umbrella (backend + frontend)
#
# From inside a project directory the bare name works too: `cd backend && mise run test`.

monorepo_root = true

# Explicit project roots. mise >= 2026.7 deprecated automatic discovery
# (the old bare `monorepo_root = true`), so list the sub-configs here.
[monorepo]
config_roots = ["backend", "frontend"]

[tools]
# apple/container (Linux containers via lightweight VMs on Apple silicon). macOS-only,
# so it is gated by os — `mise install` skips it on Linux/WSL2, where contributors use
# Docker instead. Provisions the CLI; the first run may prompt to start its system
# service (`container system start`). Requires macOS 15+ / Apple silicon. Used by the
# --container check lane below; Docker/Podman are picked up from PATH if present.
container = { version = "latest", os = ["macos"] }

# --- apple/container system service --------------------------------------------
# Manage the apple/container background service (the "daemon" the CLI talks to).
# apple/container is macOS-only, so this is a no-op elsewhere — the binary check
# below fails fast on Linux/WSL2, where contributors use Docker and manage its
# daemon themselves. `restart` stops then starts (tolerating an already-stopped
# service); `status` is what the //:_container-run helper probes before building.
#   mise run container start
#   mise run container restart
#   mise run container stop
#   mise run container status
[tasks.container]
description = "Manage the apple/container service (macOS): start | restart | stop | status | rebuild-builder."
usage = '''
arg "<action>" help="start | restart | stop | status | rebuild-builder" {
  choices "start" "restart" "stop" "status" "rebuild-builder"
}
'''
run = '''
set -eu
if ! command -v container >/dev/null 2>&1; then
  echo "apple/container is not installed (macOS 15+ / Apple silicon only)." >&2
  echo "Run 'mise install' on macOS to provision it, or use Docker instead." >&2
  exit 1
fi
case "$usage_action" in
  start)   container system start ;;
  stop)    container system stop ;;
  restart) container system stop || true; container system start ;;
  status)  container system status ;;
  # Recreate the BuildKit builder VM. Its context transfer can corrupt (symptom:
  # `error from sender: archive/tar: invalid tar header` or a 2-byte context on
  # build), especially after interrupted/concurrent builds; this clears it.
  rebuild-builder)
    container builder stop || true
    container builder delete --force || true
    container builder start ;;
esac
'''

# --- Shared container helper ---------------------------------------------------
# Builds a Dockerfile target and runs a command in it, engine-agnostic. Project
# tasks call it as `mise run //:_container-run --image ... --context ...`; it is not
# meant to be run directly (hidden from `mise tasks`). Paths are repo-root-relative.
# Parameters are usage flags rather than inherited env vars — see the `usage` block.
[tasks._container-run]
description = "(internal) Build a Dockerfile target and run a command in it."
hide = true
usage = '''
flag "--engine <engine>" help="Container engine: auto|docker|container|podman." default="auto"
flag "--image <image>" help="Image tag to build and run. (required)"
flag "--context <context>" help="Build context (repo-root-relative). (required)"
flag "--dockerfile <path>" help="Dockerfile path (-f); default <context>/Dockerfile."
flag "--target <stage>" help="build --target stage." default="ci"
flag "--cmd <cmd>" help="Command to run via `sh -c`; default the image's CMD."
flag "--bind-src <path>" help="Host path to bind-mount into the container (enables write-back)."
flag "--bind-dst <path>" help="Mount point for --bind-src; also becomes the workdir."
flag "--env-file <path>" help="Bind-mount a host env file read-only to /app/.env (so the app singleton loads it). Ignored if the path is missing."
flag "--as-user" help="Run as the current uid:gid so mounted writes stay owned by you."
flag "--cache-key-files <files>" help="Space-separated files whose hash gates image reuse (mount mode)."
flag "--rebuild" help="Force a rebuild even when the cached image's deps are unchanged."
'''
run = '''
set -eu
# Is a given engine's daemon actually reachable (not just its binary on PATH)?
engine_reachable() {
  case "$1" in
    container) command -v container >/dev/null 2>&1 && container system status >/dev/null 2>&1 ;;
    docker|podman) command -v "$1" >/dev/null 2>&1 && "$1" info >/dev/null 2>&1 ;;
    *) return 1 ;;
  esac
}
engine="${usage_engine:-auto}"
if [ "$engine" = "auto" ] || [ -z "$engine" ]; then
  # On macOS prefer apple/container (this project's default on Mac); elsewhere Docker.
  # Skip any engine whose daemon is down so a stopped Docker doesn't shadow a live one.
  case "$(uname -s)" in
    Darwin) candidates="container docker podman" ;;
    *)      candidates="docker podman" ;;
  esac
  engine=""
  for c in $candidates; do
    engine_reachable "$c" && { engine="$c"; break; }
  done
  [ -z "$engine" ] && {
    echo "No running container engine found. Start one and retry:" >&2
    echo "  - apple/container:  mise run container start   (or: container system start)" >&2
    echo "  - Docker:           open -a Docker   (or start the daemon)" >&2
    echo "Or pass --engine <docker|container|podman> explicitly." >&2
    exit 1
  }
fi
: "${usage_image:?_container-run requires --image}"
: "${usage_context:?_container-run requires --context}"
image="$usage_image"
target="${usage_target:-ci}"
# Anchor at the monorepo root so --context/--dockerfile (repo-root-relative) resolve
# correctly no matter which project directory invoked this helper.
cd "${MISE_PROJECT_ROOT:-.}"

# Decide whether to (re)build. apple/container re-transfers the whole build context
# (megabytes) and re-exports the image on every build, which dominates wall time even
# when every layer is cached. When the source is bind-mounted (--bind-src) the image
# is only a *tool provider*, so a cached image can be reused as long as the pinned deps
# (--cache-key-files, e.g. pyproject.toml + uv.lock) are unchanged. Pass --rebuild to
# always rebuild. Without a mount the image bakes in the source, so we always rebuild.
build_needed=1
key=""
marker=""
if [ -n "${usage_cache_key_files:-}" ]; then
  key=$(cat $usage_cache_key_files 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
  marker="${XDG_CACHE_HOME:-$HOME/.cache}/mise-tenantfirstaid/$(echo "$image" | tr '/:' '__').key"
fi
if [ -z "${usage_rebuild:-}" ] && [ -n "${usage_bind_src:-}" ] && [ -n "$key" ] \
   && "$engine" image inspect "$image" >/dev/null 2>&1 \
   && [ -f "$marker" ] && [ "$(cat "$marker")" = "$key" ]; then
  build_needed=""
fi
if [ -n "$build_needed" ]; then
  # apple/container's shared BuildKit builder corrupts under concurrent builds
  # (symptom: `error from sender: archive/tar: invalid tar header`), so serialize
  # builds for that engine. Docker/podman daemons isolate concurrent builds fine, so
  # they skip the lock. mkdir is atomic on POSIX (no `flock`, which macOS lacks); the
  # trap releases the lock on normal exit or signal so a killed build can't wedge it.
  lock=""
  if [ "$engine" = container ]; then
    lock="${XDG_CACHE_HOME:-$HOME/.cache}/mise-tenantfirstaid/build.lock"
    mkdir -p "$(dirname "$lock")"
    waited=0
    until mkdir "$lock" 2>/dev/null; do
      [ "$waited" -eq 0 ] && echo ">> another container build is running; waiting..." >&2
      waited=$((waited + 1))
      [ "$waited" -ge 600 ] && { echo ">> timed out waiting for the build lock ($lock)" >&2; exit 1; }
      sleep 1
    done
    trap 'rmdir "$lock" 2>/dev/null' EXIT INT TERM
  fi
  echo ">> ($PWD) $engine build --target $target -t $image ${usage_dockerfile:+-f $usage_dockerfile} $usage_context"
  "$engine" build --target "$target" -t "$image" ${usage_dockerfile:+-f "$usage_dockerfile"} "$usage_context"
  [ -n "$marker" ] && { mkdir -p "$(dirname "$marker")"; printf '%s' "$key" > "$marker"; }
  # Release the lock now so it does not span the (potentially long) run phase.
  if [ -n "$lock" ]; then rmdir "$lock" 2>/dev/null || true; trap - EXIT INT TERM; fi
else
  echo ">> reusing cached image $image (deps unchanged; pass --rebuild to force a rebuild)"
fi
# Assemble `run` options. Optional bind-mount (--bind-src:--bind-dst, made the workdir)
# and run-as-current-user (--as-user) support write-back tasks: on Linux+Docker
# --user is required for host-owned output; on macOS the VM maps writes to you either
# way, but --user keeps it consistent. HOME is set to a writable path because the
# mapped uid has no passwd entry (so tools that need $HOME still work).
set -- run --rm
if [ -n "${usage_bind_src:-}" ] && [ -n "${usage_bind_dst:-}" ]; then
  set -- "$@" -v "$usage_bind_src:$usage_bind_dst" -w "$usage_bind_dst"
fi
# Mount a host env file read-only at /app/.env so the app singleton (which reads
# <package>/../.env) finds MODEL_NAME/GOOGLE_* at runtime. The image never bakes in
# .env (.dockerignore excludes it), so tests that import the app need this. Skip
# silently if the file is absent so hermetic/CI runs (env vars only) still work.
if [ -n "${usage_env_file:-}" ] && [ -f "$usage_env_file" ]; then
  set -- "$@" -v "$usage_env_file:/app/.env:ro"
fi
if [ -n "${usage_as_user:-}" ]; then
  set -- "$@" --user "$(id -u):$(id -g)" -e HOME=/tmp
fi
if [ -n "${usage_cmd:-}" ]; then
  echo ">> $engine $* $image sh -c '$usage_cmd'"
  "$engine" "$@" "$image" sh -c "$usage_cmd"
else
  echo ">> $engine $* $image (image default command)"
  "$engine" "$@" "$image"
fi
'''

[tasks.setup]
description = "One-time dev setup: provision toolchains, install deps, and generate types."
run = '''
set -eu
# Trust every config in the tree so the per-project installs below can run.
mise trust --all
# Tools install per project config — a root `mise install` won't reach the nested
# backend/frontend configs — so provision each (no-op once installed).
mise -C backend install
mise -C frontend install
# Dependencies: backend .venv, then frontend node_modules.
mise run //backend:sync
mise run //frontend:install
# Generate the shared TypeScript types. This step straddles both toolchains (uv reads
# the backend Pydantic models; node's json2ts emits the .ts) and no single project
# scope has both, so run it in the frontend scope with the backend's mise-managed uv
# also on PATH.
uvdir=$(dirname "$(mise -C backend which uv)")
mise -C frontend exec -- sh -c "PATH=\"$uvdir:\$PATH\" npm run generate-types"
echo ""
echo "Setup complete. Start the app with two terminals:"
echo "  mise run //backend:serve     # Flask API"
echo "  mise run //frontend:dev      # Vite dev server -> http://localhost:5173"
'''

[tasks.dev]
description = "Start the backend API and frontend dev server together. --container runs the full stack in containers."
usage = '''
flag "--container" help="Run both servers in containers (a cross-engine stand-in for docker-compose)."
flag "--engine <engine>" help="Container engine: auto|docker|container|podman." default="auto"
'''
run = '''
set -eu
if [ -z "${usage_container:-}" ]; then
  # Host lane: run both dev servers concurrently with tagged output.
  exec mise run -o prefix //backend:serve ::: //frontend:dev
fi

# --- Containerized dev stack (prototype) --------------------------------------
# A cross-engine stand-in for docker-compose. The two engines have fundamentally
# different networking, so the wiring below branches by engine (verified empirically):
#   - Docker/podman: publish ports to localhost + a user network with name DNS, so
#     the frontend reaches the backend at http://<name>:PORT and you browse localhost.
#   - apple/container: NO port publishing to localhost, NO gateway, NO name DNS — but
#     each container gets a host-routable IP. So we inject the backend's IP into the
#     frontend's proxy target and you browse the frontend container's IP directly.
cd "${MISE_PROJECT_ROOT:-.}"
bport=5001; fport=5173
bimg=tenantfirstaid-backend:runtime
fimg=tenantfirstaid-frontend:local

# Resolve the engine (same policy as //:_container-run: macOS prefers apple/container).
engine="${usage_engine:-auto}"
if [ "$engine" = auto ] || [ -z "$engine" ]; then
  case "$(uname -s)" in Darwin) cands="container docker podman";; *) cands="docker podman";; esac
  engine=""
  for c in $cands; do
    if [ "$c" = container ]; then
      command -v container >/dev/null 2>&1 && container system status >/dev/null 2>&1 && { engine=container; break; }
    else
      command -v "$c" >/dev/null 2>&1 && "$c" info >/dev/null 2>&1 && { engine="$c"; break; }
    fi
  done
  [ -z "$engine" ] && { echo "No running container engine found." >&2; exit 1; }
fi

# Where the app's GCP credentials file lives on the host (from backend/.env). We mount
# both .env and the creds file read-only at the same paths the app expects.
creds=$(sed -n 's/^GOOGLE_APPLICATION_CREDENTIALS=//p' backend/.env 2>/dev/null | tr -d '"' | head -1)

cleanup() {
  echo ""; echo ">> stopping dev stack..."
  "$engine" rm -f tf-dev-backend tf-dev-frontend >/dev/null 2>&1 || true
  [ "$engine" != container ] && "$engine" network rm tf-dev-net >/dev/null 2>&1 || true
}
trap cleanup EXIT INT TERM
"$engine" rm -f tf-dev-backend tf-dev-frontend >/dev/null 2>&1 || true

echo ">> building images ($engine)..."
"$engine" build --target runtime --build-arg PORT="$bport" -t "$bimg" backend
"$engine" build --target local --build-arg PORT="$fport" -f frontend/Dockerfile -t "$fimg" .

if [ "$engine" = container ]; then
  # apple/container: routable IPs, inject backend IP into the frontend proxy target.
  "$engine" run -d --name tf-dev-backend \
    -v "$PWD/backend/.env:/app/.env:ro" ${creds:+-v "$creds:$creds:ro"} "$bimg" >/dev/null
  # Read the container's own address from the "ipv4Address" field specifically — a bare
  # IP grep would also match the injected VITE_API_PROXY_TARGET in the frontend's env.
  container_ip() { "$engine" inspect "$1" 2>/dev/null | sed -n 's/.*"ipv4Address"[^"]*"\([0-9.]*\).*/\1/p' | head -1; }
  bip=""
  for _ in $(seq 1 30); do bip=$(container_ip tf-dev-backend); [ -n "$bip" ] && break; sleep 1; done
  [ -z "$bip" ] && { echo "could not determine backend container IP" >&2; exit 1; }
  "$engine" run -d --name tf-dev-frontend \
    -e VITE_API_PROXY_TARGET="http://$bip:$bport" "$fimg" >/dev/null
  fip=""
  for _ in $(seq 1 30); do fip=$(container_ip tf-dev-frontend); [ -n "$fip" ] && break; sleep 1; done
  echo ""; echo ">> dev stack up (apple/container):"
  echo "     backend   http://$bip:$bport"
  echo "     frontend  http://$fip:$fport   <- open this in your browser"
else
  # Docker/podman: user network gives name DNS; publish ports to localhost.
  "$engine" network create tf-dev-net >/dev/null 2>&1 || true
  "$engine" run -d --name tf-dev-backend --network tf-dev-net -p "$bport:$bport" \
    -v "$PWD/backend/.env:/app/.env:ro" ${creds:+-v "$creds:$creds:ro"} "$bimg" >/dev/null
  "$engine" run -d --name tf-dev-frontend --network tf-dev-net -p "$fport:$fport" \
    -e VITE_API_PROXY_TARGET="http://tf-dev-backend:$bport" "$fimg" >/dev/null
  echo ""; echo ">> dev stack up (docker):"
  echo "     frontend  http://localhost:$fport   <- open this in your browser"
fi

echo ">> following logs (Ctrl-C to stop)..."
"$engine" logs -f tf-dev-frontend 2>&1 | sed 's/^/[frontend] /' &
"$engine" logs -f tf-dev-backend 2>&1 | sed 's/^/[backend]  /'
'''

[tasks.check]
description = "Run all host checks (backend + frontend)."
run = [
  "mise run //backend:check",
  "mise run //frontend:check",
]
