# Frontend project config (mise monorepo). Addressed from the repo root as
# `//frontend:<task>`, or by bare name from inside this directory (`mise run check`).

[tools]
# Mirror frontend/Dockerfile's node:24-* base.
node = "24"

[tasks.install]
description = "Install npm dependencies."
run = "npm install"

[tasks.dev]
description = "Start the Vite dev server."
run = "npm run dev"

[tasks.check]
description = "Frontend: generate-types, typecheck, lint, test."
usage = '''
flag "--container" help="Run in the Dockerfile ci image instead of on the host."
flag "--engine <engine>" help="Container engine: auto|docker|container|podman." default="auto"
'''
run = '''
set -eu
if [ -n "${usage_container:-}" ]; then
  # The frontend build context is the repo root (see docker-compose.yml); the ci
  # stage's default command already runs the full check suite.
  exec mise run //:_container-run \
    --image tenantfirstaid-frontend:ci --context . --dockerfile frontend/Dockerfile \
    --engine "${usage_engine:-auto}"
fi
npm run generate-types
npm run typecheck
npm run lint
npm run test -- --run
'''
