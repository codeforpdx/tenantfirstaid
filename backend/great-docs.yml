# API Reference Structure
# -----------------------
# Customize the sections below to organize your API documentation.
# - Reorder items within a section to change their display order
# - Move items between sections or create new sections
# - Use 'members: false' to exclude methods from documentation
# - Add 'desc:' to sections for descriptions

# Sections are grouped and ordered to mirror the backend user guide chapters, so a
# reader can move from a guide chapter to the symbols it describes. Great Docs
# sections are flat (no nesting), so the two-level "Chapter · Topic" structure is
# expressed through section names that share a chapter prefix and cluster in the
# on-this-page outline.
#
# Each symbol is documented once, at its defining ("canonical") module. Several
# modules re-import these names for convenience (e.g. chat and graph re-export
# OregonCity, LangChainChatManager, create_graph); those duplicates are omitted so
# the reference lists each symbol a single time.
reference:
  title: API Reference
  desc: >
    Public symbols grouped to follow the backend user guide chapters. Each symbol
    is documented once, at its defining module.
  sections:
    # Guide ch. 2 — Backend Overview.
    - title: "Backend · Endpoints"
      desc: Flask entry points and the feedback pipeline.
      contents:
        - chat.ChatView  # 1 method(s)
        - app.feedback_route
        - feedback.send_feedback
        - feedback.convert_html_to_pdf
        - app.ALLOWED_ORIGINS
        - app.limiter
        - app.mail
        - feedback.MAX_ATTACHMENT_SIZE

    # Guide ch. 3 — RAG & Document Retrieval.
    - title: "RAG · Retrieval"
      desc: The retrieval tool and the Vertex AI Search machinery behind it.
      contents:
        - langchain_tools.retrieve_city_state_laws
        - langchain_tools.retrieve_oregon_law_help
        - langchain_tools.get_active_rag_tools
        - langchain_tools.RAG_TOOL_REGISTRY
        - langchain_tools.RagBuilder
        - langchain_tools.filter_builder
        - name: langchain_tools.CityStateLawsInputSchema
          include_inherited: true
        - name: langchain_tools.QueryOnlyInputSchema
          include_inherited: true
        - langchain_tools.repair_mojibake

    - title: "RAG · Letter drafting"
      desc: Tools and template for emitting a formatted tenant letter.
      contents:
        - langchain_tools.generate_letter
        - langchain_tools.get_letter_template
        - name: langchain_tools.GenerateLetterInputSchema
          include_inherited: true
        - constants.LETTER_TEMPLATE

    - title: "RAG · Agent entry points"
      desc: The shared graph factory and its two consumers.
      contents:
        - langchain_chat_manager.LangChainChatManager  # 2 method(s)
        - graph.create_graph
        - graph.prepare_system_prompt
        - graph.TFAContext
        - graph.tools

    # Guide ch. 4 — Streaming Responses.
    - title: "Streaming · Response chunks"
      desc: The typed chunk contract shared with the frontend.
      contents:
        - schema.ResponseChunk
        - name: schema.TextChunk
          include_inherited: true
        - name: schema.ReasoningChunk
          include_inherited: true
        - name: schema.LetterChunk
          include_inherited: true
        - name: schema.EndOfStreamChunk
          include_inherited: true

    # Guide ch. 5 — Conversation Management.
    - title: "Conversation · Multi-turn state"
      desc: The agent state schema carried across turns.
      contents:
        - name: location.TFAAgentStateSchema
          include_inherited: true

    - title: "Conversation · Location context"
      desc: Jurisdiction values and input normalization.
      contents:
        - location.Location
        - location.OregonCity
        - location.UsaState
        - location.city_or_state_input_sanitizer

    # Guide ch. 6 — Configuration & Logging.
    - title: "Config · Environment"
      desc: The import-time settings singleton and credential loading.
      contents:
        - constants.SINGLETON
        - constants._GoogEnvAndPolicy  # type of SINGLETON; documents each config field
        - constants.DatastoreKey
        - constants.DEFAULT_INSTRUCTIONS
        - google_auth.load_gcp_credentials
        - google_auth.discoveryengine_client_options

    - title: "Config · Logging"
      desc: Centralized logging setup.
      contents:
        - logger.configure_logging

