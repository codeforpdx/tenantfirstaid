#   toc-depth: 2               # TOC heading depth (default: 2)
#   toc-title: On this page    # TOC title (default: "On this page")

# Custom head content
# --------------------
# great-docs frames every mermaid diagram in a full-width, centered box but leaves
# the SVG at its intrinsic size, so small diagrams sit marooned in whitespace.
# Quarto's native `fig-width` option cannot fix this: a captioned mermaid diagram is
# wrapped in a Quarto crossref "float", and those extra DOM layers push the cell's
# `data-fig-width` out of reach of the mermaid runtime's fixed 4-ancestor lookup, so
# the option is silently ignored. Scaling the rendered SVG to fill its container is
# the reliable fix. `max-width` needs `!important` to beat mermaid's inline cap.
include_in_header:
  - |
    <style>
      /* great-docs styles the mermaid cell-output-display as a centered flex row, so
         its immediate wrapper div (the flex item) shrink-wraps to the diagram's
         intrinsic width and gets centered — the SVG then has no room to grow. Force
         that wrapper, then the SVG, to span the full column. `max-width` needs
         `!important` to beat mermaid's inline cap. */
      .cell-output-display:has(.mermaid-js) > div {
        width: 100%;
      }
      .cell-output-display svg.mermaid-js {
        width: 100%;
        max-width: 100% !important;
        height: auto;
      }
    </style>

# Jupyter Kernel
# --------------
# Jupyter kernel to use for executing code cells in .qmd files.
# This is set at the project level so it applies to all pages, including
# auto-generated API reference pages. Can be overridden in individual .qmd
# file frontmatter if needed for special cases.
jupyter: python3

