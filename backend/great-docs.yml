# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Module Name (optional)
# ----------------------
# Set this if your importable module name differs from the project name.
# Example: project 'py-yaml12' with module name 'yaml12'
module: tenantfirstaid

# Docstring Parser
# ----------------
# The docstring format used in your package (numpy, google, or sphinx)
parser: google
cross_references:
  enabled: true


# Dynamic Introspection
# ---------------------
# Use runtime introspection for more accurate documentation (default: true)
# Set to false if your package has cyclic alias issues (e.g., PyO3/Rust bindings)
#
# Kept false: this is a pure-Python package, so static analysis (griffe parsing the
# source) documents it fully without importing it — which also means the build needs
# no GCP credentials. With dynamic introspection on, great-docs resolves each item as
# `tenantfirstaid:<submodule>.<name>` and getattrs the submodule off the top-level
# package; because __init__.py is empty, `tenantfirstaid.chat` isn't an attribute until
# imported, so chat.ChatView failed dynamic resolution and fell back to static with a
# warning. Static-only avoids that entirely.
dynamic: false

source:
  enabled: false        # Enable/disable source links (default: true)
  branch: main         # Git branch/tag to link to (default: auto-detect)
  path: backend/tenantfirstaid    # Custom source path for monorepos (default: auto-detect)
  placement: usage     # Where to place the link: "usage" (default) or "title"

changelog:
  enabled: true        # Enable/disable changelog (default: true)
  max_releases: 5      # Max releases to include (default: 50)

skill:
  enabled: true          # Set to false to disable skill.md entirely
  file: null             # Path to a SKILL.md (overrides curated and generated)
  well_known: true       # Serve at /.well-known/ discovery endpoints
  gotchas: []            # Gotcha strings (for auto-generated skill only)
  best_practices: []     # Best-practice strings (for auto-generated skill only)
  decision_table: []     # Rows: [{need: "...", use: "..."}]
  extra_body: null       # Path to extra Markdown to append (auto-generated only)
  skills: []             # Multi-skill mode: [{name: "...", file: "..."}]

# API Discovery Settings
# ----------------------
# Exclude items from auto-documentation
# exclude:
#   - InternalClass
#   - helper_function

# Logo & Favicon
# ---------------
# Point to a single logo file (replaces the text title in the navbar):
# logo: assets/logo.svg
#
# For light/dark variants:
# logo:
#   light: assets/logo-light.svg
#   dark: assets/logo-dark.svg
#
# To show the text title alongside the logo, add: show_title: true

